[package]
name = "zipcrawl"
version = "0.1.1"
edition = "2024"
authors = ["SirCesarium"]
description = "A high-performance ZIP explorer and content inspector for the terminal."
license = "MIT"
repository = "https://github.com/SirCesarium/zipcrawl"
readme = "README.md"
keywords = ["zip", "cli", "explorer", "grep", "tree"]
categories = ["command-line-utilities", "development-tools"]

[dependencies]
clap = { version = "4.6.0", features = ["derive"] }
regex = "1.12.3"
zip = "8.2.0"
