name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-upload:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: zipcrawl
            release_name: zipcrawl-linux-amd64
            use_cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact_name: zipcrawl
            release_name: zipcrawl-linux-musl-amd64
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: zipcrawl
            release_name: zipcrawl-linux-arm64
            use_cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: zipcrawl.exe
            release_name: zipcrawl-windows-amd64.exe
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: zipcrawl
            release_name: zipcrawl-macos-arm64
            use_cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: zipcrawl
            release_name: zipcrawl-macos-intel
            use_cross: false

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install MUSL Tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross.git

      - name: Build Binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Prepare Artifact
        run: |
          cd target/${{ matrix.target }}/release
          mv ${{ matrix.artifact_name }} ${{ matrix.release_name }}
        shell: bash

      - name: Release Binaries
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.release_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to Crates.io
    needs: build-and-upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo Publish
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        continue-on-error: true
